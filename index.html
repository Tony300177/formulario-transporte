<script>

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

document.getElementById("latitude").value = pos.coords.latitude
document.getElementById("longitude").value = pos.coords.longitude

})

}else{

alert("Geolocalização não suportada")

}

}

const SUPABASE_URL = "https://ybeykbnsuktuctpbibts.supabase.co"
const SUPABASE_KEY = "sb_publishable_qtzTXDdA-ZtsZYL0sPG2Rg_emE9SraP"

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

async function enviar(){

const { data, error } = await supabaseClient
.from("formulario_transporte")
.insert([
{
responsavel: document.getElementById("responsavel").value,
endereco: document.getElementById("endereco").value,
alunos: document.getElementById("aluno").value,
escola: document.getElementById("escola").value,
ano: document.getElementById("ano").value,
rota: document.getElementById("rota").value,
latitude: document.getElementById("latitude").value,
longitude: document.getElementById("longitude").value
}
])

if(error){

console.log(error)
alert("Erro ao enviar: " + error.message)

}else{

alert("Registro enviado com sucesso!")

document.getElementById("responsavel").value=""
document.getElementById("endereco").value=""
document.getElementById("aluno").value=""

}

}

</script>
